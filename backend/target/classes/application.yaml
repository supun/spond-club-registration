spring:
  application:
    name: membership
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/membership}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

app:
  cors:
    allowed-origins:
      - http://localhost:3000
server:
  port: ${SERVER_PORT:8080}

