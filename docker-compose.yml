services:
  postgres:
    image: postgres:16-alpine
    container_name: membership-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: membership
      POSTGRES_USER: user
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d membership"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: membership-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/membership
      DB_USERNAME: user
      DB_PASSWORD: test
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: membership-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
